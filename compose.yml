services:
    migrator:
        build:
            context: .
            target: migrator
    server:
        build:
            context: .
            target: server
        networks:
            - dokploy-network
        depends_on:
            - migrator
        expose:
            - "3001"
    web:
        build:
            context: .
            target: web
        expose:
            - "80"

networks:
    dokploy-network:
        external: true
